<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Game</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --panel:#111827;
      --panel2:#1f2937;
      --text:#f8fafc;
      --sub:#cbd5e1;
      --accent:#38bdf8;
      --good:#22c55e;
      --bad:#ef4444;
      --warn:#f59e0b;
      --line:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding-bottom:60px;
    }
    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .title{
      text-align:center;
      margin:8px 0 20px;
    }
    .title h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
      letter-spacing:0.04em;
    }
    .title p{
      margin:0;
      color:var(--sub);
      line-height:1.7;
    }
    .panel{
      background:rgba(17,24,39,0.88);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:0 20px 50px rgba(0,0,0,0.28);
      backdrop-filter:blur(8px);
    }
    .game{
      display:grid;
      gap:18px;
    }
    .status{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      min-height:88px;
    }
    .card .label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:8px;
      letter-spacing:0.04em;
    }
    .card .value{
      font-size:28px;
      font-weight:700;
      line-height:1.2;
    }
    .main{
      padding:22px;
    }
    .row{
      display:grid;
      gap:16px;
    }
    .sentenceBox, .resultBox, .controls, .guideBox{
      background:rgba(255,255,255,0.04);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }
    .sentenceLabel{
      font-size:13px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .jpText{
      font-size:16px;
      color:#e2e8f0;
      margin-bottom:10px;
      letter-spacing:0.03em;
    }
    .romanText{
      font-size:clamp(24px,3.4vw,36px);
      font-weight:700;
      line-height:1.5;
      word-break:break-all;
      letter-spacing:0.04em;
    }
    .romanText .done{
      color:var(--good);
    }
    .romanText .current{
      color:var(--warn);
      text-decoration:underline;
      text-underline-offset:6px;
    }
    .romanText .rest{
      color:#f8fafc;
    }
    .guide{
      font-size:13px;
      color:var(--sub);
      line-height:1.8;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 22px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
    }
    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(0)}
    .primary{
      background:linear-gradient(135deg, #38bdf8, #2563eb);
      color:#fff;
    }
    .secondary{
      background:#e5e7eb;
      color:#111827;
    }
    .resultBox{
      display:none;
      text-align:center;
    }
    .resultBox.show{
      display:block;
    }
    .resultTitle{
      font-size:28px;
      font-weight:800;
      margin-bottom:10px;
    }
    .resultText{
      color:var(--sub);
      line-height:1.8;
      margin-bottom:12px;
    }
    .resultScore{
      font-size:38px;
      font-weight:800;
      color:var(--accent);
      margin-bottom:8px;
    }
    .footer-fixed{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(6px);
      color:#cbd5e1;
      text-align:center;
      padding:12px 10px;
      font-size:13px;
      border-top:1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 820px){
      .status{
        grid-template-columns:repeat(2,1fr);
      }
      .card .value{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>タイピングゲーム</h1>
      <p>表示されたローマ字をすばやく正確に入力します。<br>スタート後はキーボードをそのまま打ち始められます。</p>
    </div>

    <div class="game">
      <div class="status">
        <div class="card">
          <div class="label">残り時間</div>
          <div class="value" id="timeValue">60</div>
        </div>
        <div class="card">
          <div class="label">スコア</div>
          <div class="value" id="scoreValue">0</div>
        </div>
        <div class="card">
          <div class="label">正解数</div>
          <div class="value" id="correctValue">0</div>
        </div>
        <div class="card">
          <div class="label">ミス数</div>
          <div class="value" id="missValue">0</div>
        </div>
        <div class="card">
          <div class="label">正確率</div>
          <div class="value" id="accuracyValue">100%</div>
        </div>
      </div>

      <div class="panel main">
        <div class="row">
          <div class="sentenceBox">
            <div class="sentenceLabel">お題</div>
            <div class="jpText" id="jpText">スタートを押してください</div>
            <div class="romanText" id="romanText">ready</div>
          </div>

          <div class="guideBox">
            <div class="guide">
              ルール：1文字正解で10点、ミス1回で2点減点です。時間切れになると結果が表示されます。<br>
              「ゲーム開始」を押したら、そのままキーボードで入力してください。
            </div>
          </div>

          <div class="controls">
            <button class="primary" id="startBtn">ゲーム開始</button>
            <button class="secondary" id="retryBtn">もう一度遊ぶ</button>
          </div>

          <div class="resultBox" id="resultBox">
            <div class="resultTitle">結果発表</div>
            <div class="resultScore" id="finalScore">0 点</div>
            <div class="resultText" id="resultText">おつかれさまでした。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { jp: 'こんにちは', roman: 'konnnichiwa' },
      { jp: 'ありがとう', roman: 'arigatou' },
      { jp: 'おはよう', roman: 'ohayou' },
      { jp: 'がっこう', roman: 'gakkou' },
      { jp: 'きょうはいいてんきです', roman: 'kyouhaiitenkidesu' },
      { jp: 'さくらがきれいです', roman: 'sakuragakireidesu' },
      { jp: 'すてきなひになりますように', roman: 'sutekinahininarimasuyouni' },
      { jp: 'たいぴんぐれんしゅう', roman: 'taipingurennsyuu' },
      { jp: 'すばやくせいかくにうつ', roman: 'subayakuseikakuniutsu' },
      { jp: 'こつこつつづける', roman: 'kotsukotsutsudukeru' },
      { jp: 'まいにちれんしゅう', roman: 'mainichirennsyuu' },
      { jp: 'ゆっくりでもだいじょうぶ', roman: 'yukkuridemodaijoubu' },
      { jp: 'げーむをたのしもう', roman: 'ge-muwotanoshimou' },
      { jp: 'みすしてもあせらない', roman: 'misushitemoaseranai' },
      { jp: 'しゅうちゅうしてうちこもう', roman: 'syuuchuushiteuchikomou' }
    ];

    const timeValue = document.getElementById('timeValue');
    const scoreValue = document.getElementById('scoreValue');
    const correctValue = document.getElementById('correctValue');
    const missValue = document.getElementById('missValue');
    const accuracyValue = document.getElementById('accuracyValue');
    const jpText = document.getElementById('jpText');
    const romanText = document.getElementById('romanText');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const resultBox = document.getElementById('resultBox');
    const finalScore = document.getElementById('finalScore');
    const resultText = document.getElementById('resultText');

    let shuffledQuestions = [];
    let currentQuestion = null;
    let currentIndex = 0;
    let score = 0;
    let correct = 0;
    let miss = 0;
    let totalTyped = 0;
    let remainingTime = 60;
    let timerId = null;
    let playing = false;

    function shuffle(array){
      const copied = array.slice();
      for(let i = copied.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function updateStatus(){
      timeValue.textContent = remainingTime;
      scoreValue.textContent = score;
      correctValue.textContent = correct;
      missValue.textContent = miss;
      const accuracy = totalTyped === 0 ? 100 : Math.round((correct / totalTyped) * 100);
      accuracyValue.textContent = accuracy + '%';
    }

    function renderQuestion(){
      if(!currentQuestion) return;
      jpText.textContent = currentQuestion.jp;
      const typed = currentQuestion.roman.slice(0, currentIndex);
      const current = currentQuestion.roman.slice(currentIndex, currentIndex + 1);
      const rest = currentQuestion.roman.slice(currentIndex + 1);
      romanText.innerHTML =
        '<span class="done">' + escapeHtml(typed) + '</span>' +
        '<span class="current">' + escapeHtml(current || '') + '</span>' +
        '<span class="rest">' + escapeHtml(rest) + '</span>';
    }

    function escapeHtml(text){
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function nextQuestion(){
      if(shuffledQuestions.length === 0){
        shuffledQuestions = shuffle(QUESTIONS);
      }
      currentQuestion = shuffledQuestions.shift();
      currentIndex = 0;
      renderQuestion();
    }

    function startGame(){
      clearInterval(timerId);
      shuffledQuestions = shuffle(QUESTIONS);
      currentQuestion = null;
      currentIndex = 0;
      score = 0;
      correct = 0;
      miss = 0;
      totalTyped = 0;
      remainingTime = 60;
      playing = true;
      resultBox.classList.remove('show');
      updateStatus();
      nextQuestion();

      timerId = setInterval(() => {
        remainingTime--;
        updateStatus();
        if(remainingTime <= 0){
          endGame();
        }
      }, 1000);
    }

    function endGame(){
      clearInterval(timerId);
      playing = false;
      finalScore.textContent = score + ' 点';

      let rank = '';
      if(score >= 350){
        rank = 'すばらしいです。かなり速くて正確でした。';
      }else if(score >= 220){
        rank = 'とても良い結果です。安定して入力できています。';
      }else if(score >= 120){
        rank = '良いペースです。少しずつ精度を上げていきましょう。';
      }else{
        rank = '今回はウォーミングアップですね。次はもっと伸びます。';
      }

      const accuracy = totalTyped === 0 ? 100 : Math.round((correct / totalTyped) * 100);
      resultText.textContent = '正解 ' + correct + ' 文字、ミス ' + miss + ' 回、正確率 ' + accuracy + '%。' + rank;
      resultBox.classList.add('show');
      jpText.textContent = 'おつかれさまでした';
      romanText.textContent = 'finish';
    }

    document.addEventListener('keydown', function(event){
      if(!playing) return;

      if (event.ctrlKey || event.metaKey || event.altKey) return;
      if(event.key.length !== 1){
        return;
      }

      const expected = currentQuestion.roman[currentIndex];
      const inputChar = event.key;

      totalTyped++;

      if(inputChar === expected){
        currentIndex++;
        correct++;
        score += 10;

        if(currentIndex >= currentQuestion.roman.length){
          score += 20;
          nextQuestion();
        }else{
          renderQuestion();
        }
      }else{
        miss++;
        score = Math.max(0, score - 2);
      }

      updateStatus();
      event.preventDefault();
    });

    startBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);

    updateStatus();
  </script>

  <div class="footer-fixed">
    © 2026 STRAWBERRY ALL RIGHTS RESERVED.
  </div>
</body>
</html>
